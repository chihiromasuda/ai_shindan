<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIサバイバル診断 | 才能を輝かせるプレミアム・パートナー</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        :root { --primary: #0047ab; --gold: #d4af37; --text-main: #1a1a1a; }
        html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #000; color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; transition: opacity 2s ease-in-out; z-index: -1; opacity: 0; }
        .bg-layer.active { opacity: 1; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)); z-index: -1; }
        .container { background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.4); width: 90%; max-width: 500px; padding: 2.5rem 1.5rem; border-radius: 1.5rem; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.25); text-align: center; position: relative; margin: 20px auto; }
        h1.main-title { margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; width: 100%; }
        h1.main-title img { width: 100%; max-width: 320px; height: auto; object-fit: contain; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 2rem; line-height: 1.6; color: #111; }
        .options { display: grid; gap: 1rem; }
        button.option-btn { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 0.9); padding: 1.2rem; border-radius: 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; color: #000; width: 100%; }
        button.option-btn:hover { background: #fff; border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .result-view { display: none; text-align: left; animation: fadeIn 1s ease; }
        .result-type-name { font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: center; display: block; margin-bottom: 1.5rem; }
        .type-desc { font-size: 0.95rem; line-height: 1.8; color: #1a1a1a; margin-bottom: 2rem; padding: 1rem; background: rgba(255,255,255,0.3); border-radius: 1rem; }
        .tool-card { background: rgba(255, 255, 255, 0.9); border-radius: 1rem; padding: 1.2rem; margin-bottom: 0.8rem; border: 1px solid rgba(255, 255, 255, 0.5); display: flex; align-items: center; gap: 1rem; text-decoration: none; color: inherit; }
        .tool-logo { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; object-fit: contain; }
        .tool-name { font-weight: 900; color: var(--primary); font-size: 1rem; }
        .tool-reason { font-size: 0.8rem; color: #475569; }
        .sub-tool-container { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
        .sub-tool-link { background: rgba(255, 255, 255, 0.7); padding: 0.5rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 700; text-decoration: none; color: #475569; }
        .manifesto-box { background: #fff; padding: 1.5rem; border-radius: 1rem; margin-top: 2rem; border-left: 4px solid var(--gold); }
        .manifesto-text { font-size: 0.9rem; line-height: 1.7; font-weight: 700; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div id="bg-overlay-layers">
    <div id="bg0" class="bg-layer active" style="background-image: url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=2000');"></div>
    <div id="bg1" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2000');"></div>
    <div id="bg2" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2000');"></div>
    <div id="bg3" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2000');"></div>
    <div id="bg4" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=2000');"></div>
    <div id="bg5" class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=2000');"></div>
</div>
<div class="bg-overlay"></div>
<div class="container">
    <div id="quiz">
        <h1 class="main-title"><img src="image_0.png" alt="AIサバイバル診断"></h1>
        <p class="question-text" id="q-text"></p>
        <div class="options" id="options"></div>
    </div>
    <div id="result" class="result-view">
        <div style="text-align: center; font-size: 0.7rem; letter-spacing: 0.2em; color: #64748b; margin-bottom: 0.5rem;">DIAGNOSIS RESULT</div>
        <span class="result-type-name" id="result-type"></span>
        <div class="type-desc" id="type-explanation"></div>
        <div id="tool-list"></div>
        <div id="sub-tool-list" class="sub-tool-container"></div>
        <div class="manifesto-box"><p class="manifesto-text">あなたにしか出来ないことがあります。AIを相棒にして、より自分が輝ける社会を創っていきましょう。</p></div>
        <button onclick="location.reload()" style="display: block; margin: 2rem auto 0; background: none; border: none; color: #999; cursor: pointer; text-decoration: underline; font-size: 0.8rem;">最初からやり直す</button>
    </div>
</div>

<script>
    const logos = { claude: "claude.png", mj: "midjourney.png", chatgpt: "chatgpt.png", make: "make.png", gemini: "gemini.png", gamma: "gamma.png", notion: "notion.png", canva: "canva.png", per: "perplexity.png" };
    const questions = [
        { text: "Q1. 仕事で一番「楽しい」と感じる瞬間は？", options: ["ゼロからアイデアを練る時", "情報を整理し仕組み化する時", "誰かの悩みを解決する時"], scores: [10, 20, 30] },
        { text: "Q2. AIに任せて「楽」になりたい作業は？", options: ["下調べや初稿の作成", "事務やスケジュール管理", "画像や動画のデザイン制作"], scores: [1, 2, 3] },
        { text: "Q3. 困難に直面した時、どう乗り越える？", options: ["直感と感性で突破する", "論理的に分析して解決する", "周囲と協力して乗り越える"], scores: [10, 20, 30] },
        { text: "Q4. あなたが社会に提供したい価値は？", options: ["まだ見ぬ新しい驚き", "圧倒的な効率と正確さ", "温かい繋がりと安心感"], scores: [100, 200, 300] },
        { text: "Q5. 5年後、どんな働き方をしていたい？", options: ["センス一本で自由に生きる", "チームで大きな変革を起こす", "大切な人と豊かに過ごす"], scores: [100, 200, 300] }
    ];

    let currentIdx = 0; let totalScore = 0;

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.text;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => { totalScore += q.scores[i]; next(); };
            optContainer.appendChild(btn);
        });
    }

    function next() {
        document.getElementById(`bg${currentIdx}`).classList.remove('active');
        currentIdx++;
        if(document.getElementById(`bg${currentIdx}`)) document.getElementById(`bg${currentIdx}`).classList.add('active');
        setTimeout(() => { if (currentIdx < questions.length) { renderQuestion(); } else { showResult(); } }, 200);
    }

    // ★スプレッドシート連携用関数を復活★
    async function sendLogToSheet(type, score) {
        // ここに以前のGASのURLを貼り付けてください
        const url = "https://script.google.com/macros/s/AKfycbzQM6O0tOe968B-0cfaeofygoyk2KuMcZX6B0ovAEA7olNTRuGY3opylB2VjszsZ7nf/exec"; 
        const data = { type: type, score: score };
        try { fetch(url, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) }); } catch (e) { console.error(e); }
    }

    function showResult() {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        let res = { type: "", desc: "", tools: [], subTools: [] };

        if (totalScore < 300) {
            res.type = "感性のクリエイティブ・マスター";
            res.desc = "独自のセンスを武器にする表現者。AIを共創パートナーにすることで、創造性はさらに加速します。";
            res.tools = [{ name: "Claude 3.5 Sonnet", reason: "思考の壁打ち相手に最適。", url: "https://claude.ai/", logo: logos.claude }, { name: "Midjourney", reason: "イメージを圧倒的クオリティで視覚化。", url: "https://www.midjourney.com/", logo: logos.mj }];
            res.subTools = [{ name: "Canva AI", logo: logos.canva }, { name: "Notion AI", logo: logos.notion }];
        } else if (totalScore < 500) {
            res.type = "信頼のロジカル・アーキテクト";
            res.desc = "情報を整理し仕組み化する設計者。AIによる自動化で、戦略構築に没頭できる環境を作れます。";
            res.tools = [{ name: "ChatGPT (GPT-4o)", reason: "情報の整理や要約の相棒。", url: "https://chatgpt.com/", logo: logos.chatgpt }, { name: "Make", reason: "ルーチン作業を自動連携。", url: "https://www.make.com/", logo: logos.make }];
            res.subTools = [{ name: "Perplexity", logo: logos.per }, { name: "Notion", logo: logos.notion }];
        } else {
            res.type = "共感のビジョナリー・リーダー";
            res.desc = "人の想いを結びつける調整役。AIでビジョンを可視化し、より大きな社会変革を起こせます。";
            res.tools = [{ name: "Google Gemini", reason: "Google連携で業務を円滑に。", url: "https://gemini.google.com/", logo: logos.gemini }, { name: "Gamma", reason: "プレゼン資料を瞬時にデザイン。", url: "https://gamma.app/", logo: logos.gamma }];
            res.subTools = [{ name: "Canva", logo: logos.canva }, { name: "ChatGPT", logo: logos.chatgpt }];
        }

        document.getElementById('result-type').innerText = res.type;
        document.getElementById('type-explanation').innerText = res.desc;
        const list = document.getElementById('tool-list');
        list.innerHTML = "";
        res.tools.forEach(t => {
            list.innerHTML += `<a href="${t.url}" target="_blank" class="tool-card"><img src="${t.logo}" class="tool-logo"><div><span class="tool-name">${t.name}</span><p class="tool-reason">${t.reason}</p></div></a>`;
        });
        const subList = document.getElementById('sub-tool-list');
        subList.innerHTML = "";
        res.subTools.forEach(st => { subList.innerHTML += `<span class="sub-tool-link">${st.name}</span>`; });
        
        // ★結果表示時にスプレッドシートへ送信★
        sendLogToSheet(res.type, totalScore);
    }
    renderQuestion();
</script>
</body>
</html>
